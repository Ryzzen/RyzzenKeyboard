points:
  mirror:
    ref: ortho_inner_home
    distance: 1U

  zones:
    ortho:
      anchor:
        shift: [100, -150]
      columns:
        pinky:
        ring:
          key.stagger: 14
        middle:
          key.stagger: 10
        index:
          key.stagger: -7
        inner:
          key.stagger: -4
      rows:
        bot.padding: 1U
        home.padding: 1U
        top.padding: 1U

    thumbs:
      anchor:
        ref: ortho_inner_bot
        shift: [1U, -1U]
      columns:
        thumb:
      rows:
        bottom.padding: 1U

outlines:
  switch_cutout_retention:
    - what: rectangle
      where: true
      size: [14.3, 14.3]

  switch_cutout_clearance:
    - what: rectangle
      where: true
      size: [17, 17]

  m2_through:
    - what: circle
      radius: 1.2

  m2_countersink:
    - what: circle
      radius: 2.3

  board:
    - what: polygon
      fillet: 8
      points:
        - ref: ortho_pinky_top
          shift: [-2U, 1U]
        - ref: ortho_inner_top
          shift: [-1U, 2U]
        - ref: mirror_ortho_inner_top
          shift: [-1U, 2U]
        - ref: mirror_ortho_pinky_top
          shift: [-2U, 1U]
        - ref: mirror_ortho_pinky_bot
          shift: [-1U, -1U]
        - ref: thumbs_thumb_bottom
          shift: [1U, -1.5U]
        - ref: mirror_thumbs_thumb_bottom
          shift: [1U, -1.5U]
        - ref: ortho_pinky_bot
          shift: [-1U, -1U]

  plate_holes:
    - what: outline
      name: m2_through
      where:
        ref: ortho_pinky_top
        shift: [-1U, 0.8U]

    - what: outline
      name: m2_through
      where:
        ref: mirror_ortho_pinky_top
        shift: [-1U, 0.8U]

    - what: outline
      name: m2_through
      where:
        ref: ortho_index_top
        shift: [-0.3U, 0.7U]

    - what: outline
      name: m2_through
      where:
        ref: mirror_ortho_index_top
        shift: [-0.3U, 0.7U]

    - what: outline
      name: m2_through
      where:
        ref: ortho_index_bot
        shift: [0.3U, -0.7U]

    - what: outline
      name: m2_through
      where:
        ref: mirror_ortho_index_bot
        shift: [0.3U, -0.7U]

    - what: outline
      name: m2_through
      where:
        ref: thumbs_thumb_bottom
        shift: [3U, 0U]

    - what: outline
      name: m2_through
      where:
        ref: mirror_thumbs_thumb_bottom
        shift: [3U, 0U]

  plate_countersinks:
    - what: outline
      name: m2_countersink
      where:
        ref: ortho_pinky_top
        shift: [-1U, 0.8U]

    - what: outline
      name: m2_countersink
      where:
        ref: mirror_ortho_pinky_top
        shift: [-1U, 0.8U]

    - what: outline
      name: m2_countersink
      where:
        ref: ortho_index_top
        shift: [-0.3U, 0.7U]

    - what: outline
      name: m2_countersink
      where:
        ref: mirror_ortho_index_top
        shift: [-0.3U, 0.7U]

    - what: outline
      name: m2_countersink
      where:
        ref: ortho_index_bot
        shift: [0.3U, -0.7U]

    - what: outline
      name: m2_countersink
      where:
        ref: mirror_ortho_index_bot
        shift: [0.3U, -0.7U]

    - what: outline
      name: m2_countersink
      where:
        ref: thumbs_thumb_bottom
        shift: [3U, 0U]

    - what: outline
      name: m2_countersink
      where:
        ref: mirror_thumbs_thumb_bottom
        shift: [3U, 0U]

  plate_bottom:
    - name: board
    - operation: subtract
      name: switch_cutout_retention
    - operation: subtract
      name: plate_holes

  plate_top:
    - name: board
    - operation: subtract
      name: switch_cutout_clearance
    - operation: subtract
      name: plate_holes
    - operation: subtract
      name: plate_countersinks

outputs:
  plate_bottom_dxf:
    what: dxf
    name: plate_bottom

  plate_top_dxf:
    what: dxf
    name: plate_top

pcbs:
  main_module:
    template: kicad8
    outlines:
      main:
        outline: board
    footprints:
      tmr_switches:
        what: tmr_mx_switch
        where: true
        params:
          designator: SWITCH
          side: "B"
      holeTopLeft:
        what: mountinghole
        where:
          ref: [ortho_pinky_top]
          shift: [-1U, 0.8U]
      holeTopRight:
        what: mountinghole
        where:
          ref: [mirror_ortho_pinky_top]
          shift: [-1U, 0.8U]
      holeTopInnerRight:
        what: mountinghole
        where:
          ref: [mirror_ortho_index_top]
          shift: [-0.3U, 0.7U]
      holeTopInnerLeft:
        what: mountinghole
        where:
          ref: [ortho_index_top]
          shift: [-0.3U, 0.7U]
      holeBotInnerLeft:
        what: mountinghole
        where:
          ref: [ortho_index_bot]
          shift: [0.3U, -0.7U]
      holeBotInnerRight:
        what: mountinghole
        where:
          ref: [mirror_ortho_index_bot]
          shift: [0.3U, -0.7U]
      holeBotRight:
        what: mountinghole
        where:
          ref: [mirror_thumbs_thumb_bottom]
          shift: [3U, 0U]
      holeBotLeft:
        what: mountinghole
        where:
          ref: [thumbs_thumb_bottom]
          shift: [3U, 0U]
